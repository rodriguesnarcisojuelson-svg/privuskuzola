<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — Privus Kuzola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0D1B2A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:#fff;text-decoration:none;margin-bottom:4rem;display:block}
.logo span{color:#C8A96E}
.code{font-family:'Cormorant Garamond',serif;font-size:6rem;font-weight:600;color:rgba(200,169,110,.15);line-height:1;margin-bottom:1.5rem}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;margin-bottom:1rem}
p{font-size:.9rem;font-weight:300;color:#94A3B8;margin-bottom:2.5rem;line-height:1.7;max-width:400px}
a.btn{background:#C8A96E;color:#0D1B2A;padding:.85rem 2rem;border-radius:2px;font-weight:600;font-size:.875rem;text-decoration:none;transition:background .2s}
a.btn:hover{background:#E8D5A8}
</style>
</head>
<body>
  <a href="/" class="logo">Privus <span>Kuzola</span></a>
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>A página que procura não existe ou foi movida. Volte à página principal para continuar.</p>
  <a href="/" class="btn">Voltar ao início</a>
</body>
</html>
